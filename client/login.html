<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DevGrow</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(108, 99, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(0, 212, 255, 0.06) 0%, transparent 50%);
      animation: authBgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes authBgPulse {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.05) rotate(2deg); }
    }

    .auth-container {
      position: relative;
      width: 100%;
      max-width: 460px;
      z-index: 1;
    }

    .auth-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo .logo-icon {
      width: 60px;
      height: 60px;
      font-size: 30px;
      margin: 0 auto 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
    }

    .auth-logo h1 {
      font-size: 1.8rem;
      color: var(--text-primary);
      margin: 0;
    }

    .auth-logo p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.8rem;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .auth-tab.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 10px rgba(108, 99, 255, 0.3);
    }

    .auth-tab:hover:not(.active) {
      color: var(--text-primary);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .auth-form .form-group {
      margin-bottom: 0;
    }

    .auth-form .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
    }

    .auth-form .form-control {
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
    }

    .auth-form .btn {
      margin-top: 0.5rem;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .auth-form .btn .btn-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    .auth-form .btn.loading .btn-spinner {
      display: inline-block;
    }

    .auth-form .btn.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .auth-error.show {
      display: flex;
    }

    .auth-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .auth-success.show {
      display: flex;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.2rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle input {
      padding-right: 2.8rem;
    }

    .password-toggle button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
    }

    .password-toggle button:hover {
      color: var(--text-primary);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Hidden form by default */
    .auth-form-panel { display: none; }
    .auth-form-panel.active { display: flex; flex-direction: column; gap: 1rem; }

    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem; }
      .auth-logo h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
          <div class="logo-icon">🚀</div>
          <h1>DevGrow</h1>
          <p>AI-Powered Career Growth Platform</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Error / Success Messages -->
        <div class="auth-error" id="authError">
          <span>⚠️</span>
          <span id="authErrorText"></span>
        </div>
        <div class="auth-success" id="authSuccess">
          <span>✅</span>
          <span id="authSuccessText"></span>
        </div>

        <!-- Login Form -->
        <form class="auth-form auth-form-panel active" id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="password-toggle">
              <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required minlength="6" />
              <button type="button" onclick="togglePassword('loginPassword', this)">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">
            <span class="btn-spinner"></span>
            <span class="btn-text">Sign In</span>
          </button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form auth-form-panel" id="signupForm" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" class="form-control" id="signupName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input type="email" class="form-control" id="signupEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="signupRole">Your Current Role</label>
            <select class="form-control" id="signupRole">
              <option value="">Select your role (optional)</option>
              <optgroup label="Development">
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Full Stack Developer">Full Stack Developer</option>
                <option value="DevOps Engineer">DevOps Engineer</option>
              </optgroup>
              <optgroup label="Quality & Testing">
                <option value="QA Engineer">QA Engineer</option>
                <option value="Automation Tester">Automation Tester</option>
                <option value="SDET">SDET</option>
              </optgroup>
              <optgroup label="Data & Analytics">
                <option value="Data Analyst">Data Analyst</option>
                <option value="Data Engineer">Data Engineer</option>
              </optgroup>
              <optgroup label="Other">
                <option value="UI/UX Designer">UI/UX Designer</option>
                <option value="Product Manager">Product Manager</option>
                <option value="Student">Student</option>
                <option value="Other">Other</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <div class="password-toggle">
              <input type="password" class="form-control" id="signupPassword" placeholder="At least 6 characters" required minlength="6" />
              <button type="button" onclick="togglePassword('signupPassword', this)">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="signupBtn">
            <span class="btn-spinner"></span>
            <span class="btn-text">Create Account</span>
          </button>
        </form>

        <div class="auth-footer" id="authFooter">
          <p>Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up</a></p>
        </div>

      </div>
    </div>
  </div>

  <script>
    // If already logged in, redirect to home
    fetch('/api/auth/me').then(r => r.json()).then(data => {
      if (data.success && data.user) {
        window.location.href = '/';
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form-panel').forEach(f => f.classList.remove('active'));
      hideMessages();

      if (tab === 'login') {
        document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('authFooter').innerHTML = `<p>Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up</a></p>`;
      } else {
        document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
        document.getElementById('signupForm').classList.add('active');
        document.getElementById('authFooter').innerHTML = `<p>Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in</a></p>`;
      }
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      document.getElementById('authErrorText').textContent = msg;
      el.classList.add('show');
      document.getElementById('authSuccess').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      document.getElementById('authSuccessText').textContent = msg;
      el.classList.add('show');
      document.getElementById('authError').classList.remove('show');
    }

    function hideMessages() {
      document.getElementById('authError').classList.remove('show');
      document.getElementById('authSuccess').classList.remove('show');
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      const btn = document.getElementById('loginBtn');
      setLoading(btn, true);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value.trim(),
            password: document.getElementById('loginPassword').value,
          }),
        });
        const data = await res.json();

        if (data.success) {
          showSuccess(`Welcome back, ${data.user.name}! Redirecting...`);
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          showError(data.error || 'Login failed.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        setLoading(btn, false);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      hideMessages();
      const btn = document.getElementById('signupBtn');
      setLoading(btn, true);

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('signupName').value.trim(),
            email: document.getElementById('signupEmail').value.trim(),
            password: document.getElementById('signupPassword').value,
            role: document.getElementById('signupRole').value,
          }),
        });
        const data = await res.json();

        if (data.success) {
          showSuccess(`Account created! Welcome, ${data.user.name}! Redirecting...`);
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          showError(data.error || 'Signup failed.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>
</html>
